<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Materials</title>

    <style>
      
        body {
            font-family: 'Gabriola', serif;
            background-color: #FFFFFF;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        header {
            display: flex;
            align-items: center;
            background-color: #BBD9B2;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .logo {
            height: 60px;
            width: auto;
            margin-right: 20px;
        }

        header h1 {
            color: #2D6033;
            font-size: 2.2em;
            margin: 0;
        }

        h2, h3 {
            color: #2D6033;
            margin-top: 20px;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #FFFFFF;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        th {
            background-color: #BBD9B2;
            color: #2D6033;
            font-size: 1.2em;
            padding: 12px 8px;
            text-align: left;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid #BBD9B2;
        }

        tbody tr:hover {
            background-color: #f0f7ee;
        }

        button {
            font-family: 'Gabriola', serif;
            font-size: 1.1em;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #2D6033;
            color: white;
            transition: background-color 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

            button:hover {
                background-color: #1e4422;
            }

            button.secondary {
                background-color: #BBD9B2;
                color: #2D6033;
            }

                button.secondary:hover {
                    background-color: #a8c69f;
                }

            button.delete-btn {
                background-color: #dc3545;
            }

                button.delete-btn:hover {
                    background-color: #c82333;
                }

        input {
            padding: 8px 12px;
            border: 1px solid #BBD9B2;
            border-radius: 5px;
            font-family: 'Gabriola', serif;
            font-size: 1.1em;
            margin-right: 10px;
            margin-bottom: 10px;
            width: 150px;
        }

            input:focus {
                outline: none;
                border-color: #2D6033;
                box-shadow: 0 0 5px rgba(45,96,51,0.3);
            }

        .inputs {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        hr {
            border: 1px solid #BBD9B2;
            margin: 30px 0;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

            .message.success {
                display: block;
                background-color: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
            }

            .message.error {
                display: block;
                background-color: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
            }
    </style>

</head>

<body>

    <h2>Материалы</h2>

    <button onclick="load()">Загрузка</button>

    <table border="1" id="table">
        <thead>
            <tr>
                <th>Id</th>
                <th>Название</th>
                <th>Тип</th>
                <th>Цена</th>
                <th>Колиество</th>
                <th>Минимум</th>
                <th>Упаковка</th>
                <th>Единица</th>
                <th>TypeId</th>
                <th>Delete</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <hr>

    <h3>Добавить / Изменить</h3>

    <input id="id" placeholder="Id for update">

    <input id="name" placeholder="Name">
    <input id="type" placeholder="Type">

    <input id="price" placeholder="Price">
    <input id="stock" placeholder="Stock">

    <input id="min" placeholder="Min quantity">
    <input id="package" placeholder="Package">

    <input id="metering" placeholder="Metering">
    <input id="typeId" placeholder="MaterialTypeId">

    <br><br>

    <button onclick="create()">Добавить</button>
    <button onclick="update()">Изменить</button>

    <script>

        const api = "https://localhost:7026/api/material";

        async function load() {

            const res = await fetch(api + "/Get");
            const data = await res.json();

            const tbody = document.querySelector("#table tbody");
            tbody.innerHTML = "";

            data.forEach(m => {

                const row = `
                <tr>
                    <td>${m.id}</td>
                    <td>${m.nameMaterial}</td>
                    <td>${m.typeMaterial}</td>
                    <td>${m.unitPrice}</td>
                    <td>${m.quantityStock}</td>
                    <td>${m.minQuantity}</td>
                    <td>${m.quantityPackage}</td>
                    <td>${m.metering}</td>
                    <td>${m.materialTypeId}</td>
                    <td><button onclick="remove(${m.id})">Delete</button></td>
                </tr>`;

                tbody.innerHTML += row;

            });

        }

        function getDto() {

            return {
                id: Number(document.getElementById("id").value),
                nameMaterial: document.getElementById("name").value,
                typeMaterial: document.getElementById("type").value,
                unitPrice: Number(document.getElementById("price").value),
                quantityStock: Number(document.getElementById("stock").value),
                minQuantity: Number(document.getElementById("min").value),
                quantityPackage: Number(document.getElementById("package").value),
                metering: document.getElementById("metering").value,
                materialTypeId: Number(document.getElementById("typeId").value)
            };

        }

        async function create() {

            const dto = getDto();

            await fetch(api + "/Post", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dto)
            });

            load();
        }

        async function update() {

            const dto = getDto();

            await fetch(api + "/Put/" + dto.id, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dto)
            });

            load();
        }

        async function remove(id) {

            await fetch(api + "/Delete/" + id, {
                method: "DELETE"
            });

            load();
        }

    </script>

</body>
</html>
