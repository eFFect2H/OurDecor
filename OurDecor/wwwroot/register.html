<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <link rel="stylesheet" href="css/login-reg.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Логотип" class="logo">
        <h1>Добро пожаловать</h1>
    </header>

    <div class="forms-container">
        <div class="form-card">
            <h2>Регистрация</h2>
            <div class="form-group">
                <label for="reg-login">Логин</label>
                <input type="text" id="reg-login" placeholder="Придумайте логин">
            </div>
            <div class="form-group">
                <label for="reg-password">Пароль</label>
                <input type="password" id="reg-password" placeholder="Придумайте пароль">
            </div>
            <div class="form-group">
                <label for="role">Роль</label>
                <select id="role">
                    <option value="1">Admin</option>
                    <option value="2" selected>User</option>
                </select>
            </div>
            <button class="btn" onclick="register()">Зарегистрироваться</button>
        </div>
    </div>

    <script>
        const API = "https://localhost:7026/api/account"

        async function register() {
            const response = await fetch(`${API}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    login: document.getElementById('login').value,
                    passwordHash: document.getElementById('password').value,
                    roleId: parseInt(document.getElementById('role').value)
                })
            });

            const text = await response.text();
            alert(text);
        }
    </script>
</body>
</html>
