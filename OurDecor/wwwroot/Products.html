<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Продукция компании</title>
    <link rel="stylesheet" href="css/products.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Логотип" class="logo">
        <h1>Список продукции</h1>
    </header>
    <main>
        <table id="products-table" class="table">
            <thead>
                <tr>
                    <th>Артикул</th>
                    <th>Тип продукции</th>
                    <th>Наименование</th>
                    <th>Стоимость</th>
                    <th>Ширина рулона (м)</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="products-body">
                
            </tbody>
        </table>
        <button id="add-product" class="btn btn-primary">Добавить продукцию</button>
    </main>
    <script>
        const API_BASE = 'https://localhost:7026/api/products';

        // GET: Получить все GHJL
        async function getProducts() {

            const requestOptions = {
                method: "GET",
                redirect: "follow"
            };

            const response = await fetch(`${API_BASE}/Get`, requestOptions);
            const data = await response.json();
            displayProscriptions(data); 

        }

        function displayProscriptions(data) {
            const resultDiv = document.getElementById('products-body');

            resultDiv.innerHTML = `
                <tr>
                    <td>${p.article}</td>
                    <td>${p.productTypeName}</td>
                    <td>${p.name}</td>
                    <td>${p.cost.toFixed(2)}</td>
                    <td>${p.rollWidth.toFixed(2)}</td>
                    <td>
                        <a href="product-form.html?id=${p.id}" class="edit-link"></a>
                        <a href="product-materials.html?id=${p.id}" class="materials-link"></a>
                    </td>
                </tr>
            `;
        }


        document.getElementById('add-product').addEventListener('click', () => {
            window.location.href = 'product-form.html';
        });

    </script>
    
</body>
</html>
