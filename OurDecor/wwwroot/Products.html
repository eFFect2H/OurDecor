<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Продукция компании</title>
    <link rel="stylesheet" href="css/site.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <style>
        body {
            font-family: 'Gabriola', serif;
            background-color: #FFFFFF;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        header {
            display: flex;
            align-items: center;
            background-color: #BBD9B2; 
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .logo {
            height: 60px; 
            width: auto; 
            margin-right: 20px;
        }

        h1 {
            color: #2D6033;
            font-size: 2.2em;
            margin: 0;
        }

        
        .table {
            width: 100%;
            border-collapse: collapse;
            background-color: #FFFFFF;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

            .table th {
                background-color: #BBD9B2; 
                color: #2D6033; 
                font-size: 1.2em;
                padding: 12px 8px;
                text-align: left;
            }

            .table td {
                padding: 10px 8px;
                border-bottom: 1px solid #BBD9B2;
            }

            .table tbody tr:hover {
                background-color: #f0f7ee; 
            }

        
        .btn {
            font-family: 'Gabriola', serif;
            font-size: 1.1em;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-primary {
            background-color: #2D6033; 
            color: white;
        }

            .btn-primary:hover {
                background-color: #1e4422; 
            }

        .btn-secondary {
            background-color: #BBD9B2;
            color: #2D6033;
        }

            .btn-secondary:hover {
                background-color: #a8c69f;
            }

        
        .action-link {
            color: #2D6033;
            text-decoration: none;
            font-weight: bold;
            margin-right: 10px;
        }

            .action-link:hover {
                text-decoration: underline;
            }

        
        #add-product {
            margin-top: 20px;
            font-size: 1.2em;
        }
    </style>

</head>
<body>
    <header>
        <img src="images/logo.png" alt="Логотип" class="logo">
        <h1>Список продукции</h1>
    </header>
    <main>
        <table id="products-table" class="table">
            <thead>
                <tr>
                    <th>Артикул</th>
                    <th>Тип продукции</th>
                    <th>Наименование</th>
                    <th>Стоимость</th>
                    <th>Ширина рулона (м)</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="products-body">
                
            </tbody>
        </table>
        <button id="add-product" class="btn btn-primary">Добавить продукцию</button>
    </main>
    <script>
        const API_BASE = 'https://localhost:7026/api/products';

        // GET: Получить все GHJL
        async function getProducts() {

            const requestOptions = {
                method: "GET",
                redirect: "follow"
            };

            const response = await fetch(`${API_BASE}/Get`, requestOptions);
            const data = await response.json();
            displayProscriptions(data); 

        }

        function displayProscriptions(data) {
            const resultDiv = document.getElementById('products-body');

            resultDiv.innerHTML = `
                <tr>
                    <td>${p.article}</td>
                    <td>${p.productTypeName}</td>
                    <td>${p.name}</td>
                    <td>${p.cost.toFixed(2)}</td>
                    <td>${p.rollWidth.toFixed(2)}</td>
                    <td>
                        <a href="product-form.html?id=${p.id}" class="edit-link"></a>
                        <a href="product-materials.html?id=${p.id}" class="materials-link"></a>
                    </td>
                </tr>
            `;
        }


        document.getElementById('add-product').addEventListener('click', () => {
            window.location.href = 'product-form.html';
        });

    </script>
    
</body>
</html>
